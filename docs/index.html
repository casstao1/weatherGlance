<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkyGlance Support</title>
  <style>
    :root {
      color-scheme: light dark;
      --background: #f6f8fb;
      --text: #162033;
      --muted: #5f6f86;
      --card: #ffffff;
      --border: #dce4ef;
      --accent: #0a66c2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #0f1724;
        --text: #eff5ff;
        --muted: #a8b5c8;
        --card: #162233;
        --border: #26364c;
        --accent: #78b7ff;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(120, 183, 255, 0.22), transparent 34rem),
        linear-gradient(145deg, var(--background), color-mix(in srgb, var(--background) 88%, #78b7ff));
      color: var(--text);
      line-height: 1.55;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 28px;
      background: color-mix(in srgb, var(--card) 92%, transparent);
      box-shadow: 0 24px 80px rgba(10, 31, 68, 0.14);
      padding: clamp(28px, 5vw, 56px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    p {
      max-width: 680px;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--card) 82%, transparent);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>SkyGlance Support</h1>
      <p>
        SkyGlance shows weather forecasts, widgets, and trial status for iPhone.
        For support, bug reports, or privacy questions, use the links below.
      </p>
      <div class="links">
        <a class="button" href="https://github.com/casstao1/weatherGlance/issues">Contact Support</a>
        <a class="button" href="./privacy/">Privacy Policy</a>
      </div>
    </section>
  </main>
</body>
</html>
