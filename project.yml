name: SkyGlance
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  bundleIdPrefix: com.castao

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "8"

targets:

  # ── Main app ──────────────────────────────────────────────────────────────
  SkyGlance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SkyGlance
      - path: SkyGlance/Assets.xcassets
    info:
      path: SkyGlance/App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.castao.weatherGlance
        INFOPLIST_FILE: SkyGlance/App/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: SkyGlance
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: SkyGlanceWidget
    entitlements:
      path: SkyGlance/SkyGlance.entitlements

  # ── Widget extension ──────────────────────────────────────────────────────
  SkyGlanceWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SkyGlanceWidget
      - path: SkyGlanceWidget/Assets.xcassets
      - path: SkyGlance/Models
      - path: SkyGlance/Theme
      - path: SkyGlance/Icons
      - path: SkyGlance/Components
      - path: SkyGlance/Data
    info:
      path: SkyGlanceWidget/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.castao.weatherGlance.widget
        INFOPLIST_FILE: SkyGlanceWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: SkyGlance
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: SkyGlanceWidget/SkyGlanceWidget.entitlements
